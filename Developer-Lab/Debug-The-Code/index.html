<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug The Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="panel">
    <header>
      <h1>🐛 Debug The Code</h1>
      <p class="subtitle">Spot the bug before time runs out</p>
      <div class="stats-row">
        <div class="stat-pill">
          <span class="stat-label">Question</span>
          <span class="stat-value" id="levelStat">1/5</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="scoreStat">0</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timerStat">--</span>
        </div>
        <div class="stat-pill">
          <span class="stat-label">Best</span>
          <span class="stat-value" id="bestStat">--</span>
        </div>
      </div>
    </header>

    <div class="difficulty-row" id="difficultyRow">
      <button class="diff-btn active" data-diff="easy">Easy</button>
      <button class="diff-btn" data-diff="medium">Medium</button>
      <button class="diff-btn" data-diff="hard">Hard</button>
    </div>

    <div class="level-banner hidden" id="levelBanner">
      <span class="level-tag" id="levelTag">Question 1</span>
      <span class="level-title" id="levelTitleText">Missing Semicolon</span>
    </div>

    <div class="code-panel">
      <div class="code-window-bar">
        <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
        <span class="file-name">script.js</span>
      </div>
      <div class="code-lines" id="codeLines">
        <p class="idle-hint" id="idleHint">Pick a difficulty and press Start to load the first buggy snippet</p>
      </div>
    </div>

    <div class="feedback-box hidden" id="feedbackBox"></div>

    <div class="button-row">
      <button class="primary-btn" id="startBtn">Start Game</button>
      <button class="secondary-btn" id="restartBtn" disabled>↺ Restart</button>
    </div>
  </div>

  <div class="win-overlay hidden" id="endOverlay">
    <div class="win-modal">
      <h2>🎉 Debugging Complete!</h2>
      <p>Difficulty: <span id="finalDifficulty">Easy</span></p>
      <p>Score: <span id="finalScore">0</span></p>
      <p>Solved: <span id="finalSolved">0/5</span></p>
      <p>Accuracy: <span id="finalAccuracy">0%</span></p>
      <p class="best-tag hidden" id="newBestTag">🏆 New Best!</p>
      <button class="primary-btn" id="playAgainBtn">Play Again</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
